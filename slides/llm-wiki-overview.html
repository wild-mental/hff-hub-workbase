<header>HFF-Hub LLM-Wiki Overview</header>
<h1 id="%EB%AC%B8%EC%A0%9C--%EB%8B%B5%EC%9D%80-%EB%A7%A4%EB%B2%88-%EC%B1%84%ED%8C%85%EC%97%90-%ED%9D%A9%EC%96%B4%EC%A7%84%EB%8B%A4">문제 — 답은 매번 채팅에 흩어진다</h1>
<ul>
<li>LLM과의 대화는 <strong>휘발적</strong>이다. 오늘 정리한 맥락이 내일 사라진다.</li>
<li>같은 질문을 반복하면 매번 다른 답이 나온다 (<strong>일관성 부족</strong>).</li>
<li>프로젝트 문서는 사람이 쓰는 구조 → LLM이 1000줄 PRD 매번 전부 읽어야 함.</li>
<li><strong>채팅 메모리 ≠ 지식 자산.</strong> 기록 없이 쌓일 수 없다.</li>
</ul>
<blockquote>
<p><strong>위키는 기억의 인프라다.</strong> 1회성 답변이 아니라 누적되는 자산이어야 한다.</p>
</blockquote>

<h1 id="%EC%9E%AC%EB%A3%8C%EC%9D%98-%EC%84%B1%EA%B2%A9--%EC%9D%98%EB%AF%B8-%EB%8B%A8%EC%9C%84%EC%9D%98-%EB%B2%BD%EB%8F%8C">재료의 성격 — 의미 단위의 벽돌</h1>
<ul>
<li><strong>제품 단:</strong> PRD(비전·로드맵) + SRS(AC·NFR)</li>
<li><strong>시장 단:</strong> Porter + 경쟁사 + Value Chain + KSF</li>
<li><strong>고객 단:</strong> TAM/SAM/SOM + 페르소나 맵 + CJM + AOS-DOS + JTBD</li>

</ul>
<h3 id="%EA%B3%B5%ED%86%B5-%ED%8A%B9%EC%A7%95">공통 특징</h3>

<li>각 문서에 <strong>교차 참조가 이미 있음</strong> (PRD가 AOS-DOS를 인용하는 식)</li>
<li><strong>그대로 LLM에게 먹이면</strong> 맥락 유실 — 위키가 필요한 이유</li>
</ul>

<header>HFF-Hub LLM-Wiki Overview</header>
<h1 id="%ED%8E%98%EC%9D%B4%EC%A7%80-%EC%9E%91%EC%84%B1-%EA%B4%80%EB%A1%80--%ED%91%9C%EC%A4%80-%ED%94%84%EB%A1%A0%ED%8A%B8%EB%A7%A4%ED%84%B0">페이지 작성 관례 — 표준 프론트매터</h1>
<p>모든 페이지는 동일한 YAML 헤더로 시작한다.</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-yaml"><span class="hljs-meta">---</span>
<span class="hljs-attr">title:</span> <span class="hljs-string">&lt;한국어</span> <span class="hljs-string">제목&gt;</span>
<span class="hljs-attr">type:</span> <span class="hljs-string">source</span> <span class="hljs-string">|</span> <span class="hljs-string">entity</span> <span class="hljs-string">|</span> <span class="hljs-string">persona</span> <span class="hljs-string">|</span> <span class="hljs-string">feature</span> <span class="hljs-string">|</span> <span class="hljs-string">competitor</span> <span class="hljs-string">|</span> <span class="hljs-string">concept</span> <span class="hljs-string">|</span> <span class="hljs-string">meta</span>
<span class="hljs-attr">status:</span> <span class="hljs-string">draft</span> <span class="hljs-string">|</span> <span class="hljs-string">stable</span> <span class="hljs-string">|</span> <span class="hljs-string">stale</span>
<span class="hljs-attr">last_updated:</span> <span class="hljs-string">YYYY-MM-DD</span>
<span class="hljs-attr">sources:</span> [<span class="hljs-string">raw/&lt;file&gt;.md</span>, <span class="hljs-string">...</span>]      <span class="hljs-comment"># 근거 원본</span>
<span class="hljs-attr">related:</span> [<span class="hljs-string">wiki/&lt;path&gt;.md</span>, <span class="hljs-string">...</span>]     <span class="hljs-comment"># 위키 내 교차 참조</span>
<span class="hljs-attr">tags:</span> [<span class="hljs-comment">#건기식, #MVP, ...]</span>
<span class="hljs-meta">---
</span></code></pre>
<h3 id="%ED%9A%A8%EA%B3%BC">효과</h3>
<ul>
<li><strong>Lint 자동화 가능</strong> — 누락 필드·오래된 날짜 즉시 검출</li>
<li><strong>질의 시 필터링</strong> — &quot;status: stable 만 인용해&quot;</li>
<li><strong>고아 페이지 0건</strong> — related 필수 → 모두 연결됨</li>
</ul>

<h1 id="%EC%9A%B4%EC%98%81-%EC%9B%8C%ED%81%AC%ED%94%8C%EB%A1%9C--3-%EB%8F%99%EC%82%AC">운영 워크플로 — 3 동사</h1>
<h3 id="%F0%9F%93%A5-ingest--%EC%83%88-%EC%9B%90%EB%B3%B8%EC%9D%84-%EC%9C%84%ED%82%A4%EC%97%90-%ED%8E%B8%EC%9E%85"><img class="emoji" draggable="false" alt="📥" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@14.1.2/assets/svg/1f4e5.svg" data-marp-twemoji=""/> Ingest — 새 원본을 위키에 편입</h3>

<h1 id="%EA%B8%88%EA%B8%B0--%EC%9C%84%ED%82%A4%EA%B0%80-%EB%90%98%EC%A7%80-%EC%95%8A%EA%B2%8C-%EB%A7%89%EB%8A%94-%EA%B2%83">금기 — 위키가 되지 않게 막는 것</h1>

<header>HFF-Hub LLM-Wiki Overview</header>
<h1 id="%EC%9C%84%ED%82%A4%EA%B0%80-%EC%8B%A4%EC%A0%9C%EB%A1%9C-%EB%8B%AC%EC%84%B1%ED%95%9C-%EA%B2%83">위키가 실제로 달성한 것</h1>
<h3 id="before-%EC%9B%90%EB%B3%B8%EB%A7%8C-%EC%9E%88%EC%9D%8C">Before (원본만 있음)</h3>
<ul>
<li>13개 산출물을 LLM이 매번 전부 읽어야 함</li>
<li>같은 질문에 매번 다른 답 가능성</li>
<li>&quot;페르소나 C2가 F2를 쓸 때 CJM-3에서&quot; 같은 교차 질의 불가</li>
</ul>
<h3 id="after-%EC%9C%84%ED%82%A4--%EC%8A%A4%ED%82%A4%EB%A7%88">After (위키 + 스키마)</h3>
<ul>
<li>LLM은 <code>index.md</code> → 관련 2~3 페이지만 읽으면 됨 (<strong>토큰 20% 이하</strong>)</li>
<li>질문·답변이 위키에 적재되어 시간이 갈수록 <strong>정확도 상승</strong></li>
<li><code>C1 × F1 × CJM-2</code> 같은 <strong>3차원 질의 즉시</strong> 가능</li>
<li>Lint·자동 갱신으로 <strong>일관성 자가 유지</strong></li>
</ul>
